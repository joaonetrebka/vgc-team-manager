<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Pokémon - VGC Team Manager</title>
</head>
<body>
    <h1>Editar {{ pokemon[2] }}</h1>

    <form method="POST">
        <input type="text" name="especie" value="{{ pokemon[2] }}" required><br>
        <input type="text" name="item" value="{{ pokemon[3] }}" placeholder="Item"><br>
        <input type="text" name="habilidade" value="{{ pokemon[4] }}" placeholder="Habilidade"><br>
        <input type="text" name="natureza" value="{{ pokemon[5] }}" placeholder="Natureza"><br>
        <input type="text" name="tera_type" value="{{ pokemon[6] }}" placeholder="Tera Type"><br>
        <input type="text" name="golpe1" value="{{ pokemon[7] }}" placeholder="Golpe 1"><br>
        <input type="text" name="golpe2" value="{{ pokemon[8] }}" placeholder="Golpe 2"><br>
        <input type="text" name="golpe3" value="{{ pokemon[9] }}" placeholder="Golpe 3"><br>
        <input type="text" name="golpe4" value="{{ pokemon[10] }}" placeholder="Golpe 4"><br>
        <button type="submit">Salvar</button>
    </form>
    <p style="color: red;">{{ mensagem }}</p>
    <a href="/times/{{ pokemon[1] }}">Cancelar</a>
</body>
</html>
